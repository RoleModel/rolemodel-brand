<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- This site is the GitHub Pages embed source for
         https://rolemodelsoftware.com/brand (loaded via <iframe> from Framer).
         noindex keeps these URLs out of search so they don't duplicate the
         Framer page; canonical points authority at the real page.

         Single-page layout: every guideline section stacked on one scrolling
         document with a persistent brand switcher (see assets/js/one-page.js). -->
    <meta name="robots" content="noindex, nofollow" />
    <link rel="canonical" href="https://rolemodelsoftware.com/brand" />
    <title>RoleModel Brand Guidelines</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Variable-range requests (note the ".." ) so the browser gets the real
       variable font file with a continuous weight axis, not fixed static
       cuts — needed to animate thickness smoothly per brand. -->
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,100..1000&family=Space+Grotesk:wght@300..700&family=Geist+Mono:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/index.css?v=32d600b5" />
    <link rel="stylesheet" href="./assets/css/one-page.css" />
  </head>

  <body class="op-body">
    <main id="one-page-root" aria-label="Brand guidelines"></main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/MorphSVGPlugin.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/MotionPathPlugin.min.js"></script>
    <script type="module" src="./assets/js/one-page.js"></script>
  </body>
</html>
