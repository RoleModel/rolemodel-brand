<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visual Style — Brand Guidelines</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,100..1000&family=Space+Grotesk:wght@300..700&family=Geist+Mono:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/index.css" />
    <script>
      if (new URLSearchParams(location.search).get("embed") === "1")
        document.documentElement.classList.add("is-embedded");
    </script>
  </head>
  <body>
    <div id="nav-root"></div>
    <div id="page-header-root"></div>

    <main class="page-content" aria-label="Visual style guidelines">
      <section aria-labelledby="principles-heading">
        <span class="section-label" id="principles-heading"
          >Style Principles</span
        >
        <div class="style-grid" id="principles-grid"></div>
      </section>

      <section aria-labelledby="radius-heading">
        <span class="section-label" id="radius-heading">Border Radius</span>
        <div class="radius-list" id="radius-grid"></div>
      </section>

      <section aria-labelledby="shadow-heading">
        <span class="section-label" id="shadow-heading"
          >Elevation &amp; Shadows</span
        >
        <div class="shadow-list" id="shadow-row"></div>
      </section>

      <section aria-labelledby="grid-heading">
        <span class="section-label" id="grid-heading">Layout Grid</span>
        <div id="grid-content"></div>
      </section>
    </main>

    <script type="module">
      import {
        initPage,
        categoryInfo,
        staggerReveal,
        initReveal,
      } from "../assets/js/modules/page-utils.js";

      const { brand, accentHex } = initPage("visual-style");
      const { category: cat, numLabel } = categoryInfo("visual-style", "08");

      document.querySelector("#page-header-root").setHTMLUnsafe(/* html */ `
  <div class="page-header">
    <span class="page-header__num">${numLabel}</span>
    <h1 class="page-header__title" style="color:${accentHex}">${cat.name || "Visual Style"}</h1>
    <p class="page-header__tagline">${cat.tagline || "Crafted and considered — consistent geometry and restraint."}</p>
  </div>
`);
      document.title = `Visual Style — ${brand.name || "Brand Guidelines"}`;

      // Principles
      const principles = [
        {
          title: "Geometric Restraint",
          desc: "Consistent radius, consistent shadow, consistent spacing. The system is visible through its regularity — not through decoration.",
          preview: /* svg */ `<svg width="160" height="120" viewBox="0 0 160 120" fill="none">
      <rect x="20" y="20" width="56" height="56" rx="6" fill="${accentHex}" opacity="0.12"/>
      <rect x="84" y="20" width="56" height="56" rx="6" fill="${accentHex}" opacity="0.12"/>
      <rect x="20" y="84" width="56" height="24" rx="6" fill="${accentHex}" opacity="0.12"/>
      <rect x="84" y="84" width="56" height="24" rx="6" fill="${accentHex}" opacity="0.12"/>
    </svg>`,
        },
        {
          title: "Density at Scale",
          desc: "Information is dense at smaller scales (data, controls) and sparse at larger scales (hero, marketing). Breathing room is a design element.",
          preview: /* svg */ `<svg width="160" height="120" viewBox="0 0 160 120" fill="none">
      ${[0, 12, 24, 36, 48].map((y) => /* svg */ `<rect x="20" y="${y + 20}" width="${60 + y}" height="6" rx="3" fill="${accentHex}" opacity="0.12"/>`).join("")}
    </svg>`,
        },
        {
          title: "Meaningful Color",
          desc: "Color communicates status, hierarchy, or brand identity — not decoration. One dominant hue per composition with a single accent at most.",
          preview: /* svg */ `<svg width="160" height="120" viewBox="0 0 160 120" fill="none">
      <rect x="20" y="40" width="80" height="40" rx="6" fill="${accentHex}"/>
      <rect x="112" y="52" width="28" height="16" rx="4" fill="#FCF496"/>
      <rect x="20" y="92" width="120" height="4" rx="2" fill="${accentHex}" opacity="0.15"/>
    </svg>`,
        },
        {
          title: "Typographic Hierarchy",
          desc: "Scale and weight carry the hierarchy — not color or decorative treatment. Every text element has a single clear role.",
          preview: /* svg */ `<svg width="160" height="120" viewBox="0 0 160 120" fill="none">
      <text x="20" y="44" font-size="24" font-weight="700" fill="${accentHex}" font-family="system-ui" letter-spacing="-1">Headline</text>
      <text x="20" y="64" font-size="13" fill="#04242B" font-family="system-ui" opacity="0.6">Sub-heading text here</text>
      <text x="20" y="80" font-size="11" fill="#04242B" font-family="system-ui" opacity="0.35">Body copy, more detail about the topic.</text>
    </svg>`,
        },
      ];

      document.querySelector("#principles-grid").setHTMLUnsafe(
        principles
          .map(
            (p, i) => /* html */ `
  <div class="style-card reveal" data-delay="${i * 70}">
    <div class="style-card__preview">${p.preview}</div>
    <div class="style-card__body">
      <div class="style-card__title">${p.title}</div>
      <p class="style-card__desc">${p.desc}</p>
    </div>
  </div>
`
          )
          .join("")
      );

      // Border radius + shadows are read straight off the live CSS custom
      // properties (tokens.css) — this page must always show the values the
      // rest of the site actually renders with, never a hand-typed guess.
      const tokenValue = (name) =>
        getComputedStyle(document.documentElement)
          .getPropertyValue(name)
          .trim();

      const radii = [
        { token: "--radius-xs", size: 40, usage: "Tags, chips" },
        { token: "--radius-sm", size: 48, usage: "Small controls" },
        { token: "--radius-md", size: 56, usage: "Buttons, inputs" },
        { token: "--radius-lg", size: 64, usage: "Cards (compact)" },
        { token: "--radius-xl", size: 72, usage: "Cards (standard)" },
        { token: "--radius-2xl", size: 88, usage: "Cards (prominent)" },
        { token: "--radius-pill", size: 48, usage: "Pills, toggles" },
      ];

      document.querySelector("#radius-grid").setHTMLUnsafe(
        radii
          .map((r, i) => {
            const value = tokenValue(r.token);
            return /* html */ `
  <div class="radius-demo reveal" data-delay="${i * 50}">
    <div class="radius-demo__shape" style="width:${r.size}px;height:${r.size}px;border-radius:var(${r.token})"></div>
    <span class="radius-demo__label">${value}</span>
    <span class="radius-demo__usage">${r.usage}</span>
  </div>
`;
          })
          .join("")
      );

      // Shadows
      const shadows = [
        { name: "Card", token: "--shadow-card", usage: "Cards, panels" },
        {
          name: "Raised",
          token: "--shadow-raised",
          usage: "Floating buttons, active states",
        },
        { name: "Modal", token: "--shadow-modal", usage: "Modals, lightboxes" },
      ];

      document.querySelector("#shadow-row").setHTMLUnsafe(
        shadows
          .map(
            (s, i) => /* html */ `
  <div class="shadow-demo reveal" data-delay="${i * 60}" style="box-shadow:var(${s.token})">
    <span class="shadow-demo__name">${s.name}</span>
    <span class="shadow-demo__usage">${s.usage}</span>
  </div>
`
          )
          .join("")
      );

      // Grid content
      const specs = [
        {
          label: "Max Width",
          token: "--content-max",
          text: "Content container. Centered with horizontal padding.",
        },
        {
          label: "Gutter",
          token: "--content-pad",
          text: "Horizontal padding on page content. Tightens on mobile.",
        },
        {
          label: "Section Gap",
          token: "--section-gap",
          text: "Vertical space between major content sections.",
        },
      ];

      document.querySelector("#grid-content").setHTMLUnsafe(/* html */ `
  <div class="spec-card reveal">
    <div class="spec-card__grid">
      ${specs
        .map(
          (s) => /* html */ `
        <div>
          <span class="spec-card__label">${s.label}</span>
          <p class="spec-card__value">${tokenValue(s.token)}</p>
          <p class="spec-card__text">${s.text}</p>
        </div>
      `
        )
        .join("")}
    </div>
  </div>
`);

      staggerReveal(document.querySelectorAll(".reveal"), 0, 60);
      initReveal();
    </script>
  </body>
</html>
