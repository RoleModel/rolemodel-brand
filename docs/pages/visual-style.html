<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="canonical" href="https://rolemodelsoftware.com/brand" />
    <title>Visual Style — Brand Guidelines</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,100..1000&family=Space+Grotesk:wght@300..700&family=Geist+Mono:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/index.css?v=a326d320" />
    <script>
      (() => {
        const de = document.documentElement;
        if (new URLSearchParams(location.search).get("embed") === "1") {
          de.classList.add("is-embedded");
        }
        // Hide the page until its module has built the injected DOM (cleared in
        // page-utils initPage). The timeout is a failsafe so the page still
        // reveals if the module loads slowly or fails to run.
        de.classList.add("is-building");
        setTimeout(() => de.classList.remove("is-building"), 2000);
      })();
    </script>
  </head>

  <body
    style="
      background-image: radial-gradient(#0c2f40 1px, transparent 1px);
      background-size: 20px 20px;
      background-color: #04242b;
      color: #ffffff;
    "
  >
    <div id="nav-root"></div>

    <header class="visual-style-hero">
      <canvas
        class="visual-style-hero__canvas"
        id="shader-canvas"
        aria-hidden="true"
      ></canvas>
      <div class="visual-style-hero__card">
        <span class="visual-style-hero__num" id="hero-num"></span>
        <h1 class="visual-style-hero__title" id="hero-title">Visual Style</h1>
        <p class="visual-style-hero__intro" id="hero-intro"></p>
      </div>
    </header>

    <main
      class="page-content page-content--visual-style"
      aria-label="Visual style guidelines"
    >
      <section aria-labelledby="library-heading">
        <span class="section-label" id="library-heading">Image Library</span>
        <p class="image-viewer__hint">
          Click any image to view it full screen.
        </p>
        <div class="image-viewer" id="image-viewer" role="list"></div>
      </section>
    </main>

    <div
      class="lightbox"
      id="lightbox"
      role="dialog"
      aria-modal="true"
      aria-label="Image viewer"
      hidden
    >
      <button
        class="lightbox__close"
        id="lightbox-close"
        aria-label="Close viewer"
      >
        <svg
          width="16"
          height="16"
          viewBox="0 0 16 16"
          fill="none"
          aria-hidden="true"
        >
          <path
            d="M2 2L14 14M14 2L2 14"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          />
        </svg>
      </button>
      <button
        class="lightbox__arrow lightbox__arrow--prev"
        id="lightbox-prev"
        aria-label="Previous image"
      >
        <svg
          width="18"
          height="18"
          viewBox="0 0 18 18"
          fill="none"
          aria-hidden="true"
        >
          <path
            d="M11.5 3L6 9L11.5 15"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>
      <figure class="lightbox__stage">
        <img
          class="lightbox__image"
          id="lightbox-image"
          src=""
          alt="Brand imagery"
        />
      </figure>
      <button
        class="lightbox__arrow lightbox__arrow--next"
        id="lightbox-next"
        aria-label="Next image"
      >
        <svg
          width="18"
          height="18"
          viewBox="0 0 18 18"
          fill="none"
          aria-hidden="true"
        >
          <path
            d="M6.5 3L12 9L6.5 15"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>
      <span class="lightbox__counter" id="lightbox-counter">1 / 1</span>
    </div>

    <script type="module">
      import {
        initPage,
        categoryInfo,
        initReveal,
      } from "../assets/js/modules/page-utils.js";
      import { SHADER_CONFIGS } from "../assets/js/modules/shader-configs.js";

      const { slug, brand, pageData } = initPage("visual-style");
      const { category: cat, numLabel } = categoryInfo("visual-style", "08");

      document.title = `Visual Style — ${brand.name || "Brand Guidelines"}`;
      document.querySelector("#hero-num").textContent = `${numLabel}.`;
      document.querySelector("#hero-title").textContent =
        cat.name || "Visual Style";
      document.querySelector("#hero-intro").textContent = cat.tagline || "";

      // ---- Brand shader background — falls back to the plain dark/dot-grid
      // CSS background (see visual-style.css) if this brand has no config,
      // or if the shader library fails to load for any reason. ----
      const shaderConfig = SHADER_CONFIGS[slug];
      if (shaderConfig) {
        import("https://esm.sh/shaders/js")
          .then(({ createShader }) =>
            createShader(document.querySelector("#shader-canvas"), shaderConfig)
          )
          .catch((err) => {
            console.error("Shader background failed to load:", err);
          });
      }

      // ---- Image library — curated set when present, else the brand's main imagery ----
      const images = pageData.visualStyleImagery || pageData.imagery || [];
      const viewer = document.querySelector("#image-viewer");
      viewer.setHTMLUnsafe(
        images
          .map(
            (img, i) => /* html */ `
  <button class="image-viewer__tile reveal" role="listitem" data-index="${i}"
          data-delay="${(i % 8) * 40}" aria-label="View image ${i + 1} full screen">
    <img class="image-viewer__img" src="${img.src}" alt="Brand imagery ${i + 1}" loading="lazy" decoding="async"/>
  </button>
`
          )
          .join("")
      );

      // ---- Lightbox ----
      const lightbox = document.querySelector("#lightbox");
      const lightboxImage = document.querySelector("#lightbox-image");
      const lightboxCounter = document.querySelector("#lightbox-counter");
      let current = 0;
      let lastFocus = null;

      const show = (index) => {
        current = (index + images.length) % images.length;
        lightboxImage.src = images[current].full || images[current].src;
        lightboxCounter.textContent = `${current + 1} / ${images.length}`;
      };

      const openLightbox = (index) => {
        lastFocus = document.activeElement;
        show(index);
        lightbox.hidden = false;
        document.body.classList.add("lightbox-open");
        requestAnimationFrame(() =>
          lightbox.classList.add("lightbox--visible")
        );
        document.querySelector("#lightbox-close").focus();
      };

      const closeLightbox = () => {
        lightbox.classList.remove("lightbox--visible");
        document.body.classList.remove("lightbox-open");
        setTimeout(() => {
          lightbox.hidden = true;
        }, 250);
        if (lastFocus) lastFocus.focus();
      };

      viewer.addEventListener("click", (e) => {
        const tile = e.target.closest(".image-viewer__tile");
        if (tile) openLightbox(Number(tile.dataset.index));
      });
      document
        .querySelector("#lightbox-close")
        .addEventListener("click", closeLightbox);
      document
        .querySelector("#lightbox-prev")
        .addEventListener("click", () => show(current - 1));
      document
        .querySelector("#lightbox-next")
        .addEventListener("click", () => show(current + 1));
      lightbox.addEventListener("click", (e) => {
        if (e.target === lightbox) closeLightbox();
      });
      document.addEventListener("keydown", (e) => {
        if (lightbox.hidden) return;
        if (e.key === "Escape") closeLightbox();
        if (e.key === "ArrowLeft") show(current - 1);
        if (e.key === "ArrowRight") show(current + 1);
      });

      initReveal();
    </script>
  </body>
</html>
