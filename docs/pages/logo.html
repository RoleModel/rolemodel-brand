<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="canonical" href="https://rolemodelsoftware.com/brand" />
    <title>Logo — Brand Guidelines</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,100..1000&family=Space+Grotesk:wght@300..700&family=Geist+Mono:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/index.css?v=c64c61b5" />
    <script>
      (() => {
        const de = document.documentElement;
        if (new URLSearchParams(location.search).get("embed") === "1") {
          de.classList.add("is-embedded");
        }
        // Hide the page until its module has built the injected DOM (cleared in
        // page-utils initPage). The timeout is a failsafe so the page still
        // reveals if the module loads slowly or fails to run.
        de.classList.add("is-building");
        setTimeout(() => de.classList.remove("is-building"), 2000);
      })();
    </script>
  </head>

  <body>
    <div id="nav-root"></div>
    <div id="page-header-root"></div>

    <main class="page-content" aria-label="Logo guidelines">
      <section id="logo-section" aria-labelledby="logo-heading">
        <span class="section-label" id="logo-heading">Wordmark &amp; Icon</span>
        <div id="logo-grid"></div>
        <div class="logo-actions reveal">
          <div id="download-zip"></div>
          <p class="logo-actions__note">
            Dashed guides show the required clear space —
            <strong>40% of the icon height</strong> on all sides. Never crowd
            the mark.
          </p>
        </div>
      </section>

      <section id="family-section" aria-labelledby="family-heading" hidden>
        <span class="section-label" id="family-heading">Product Family</span>
        <p class="section-note" id="family-note"></p>
        <div class="subbrand-grid" id="subbrand-grid"></div>
        <div class="family-actions reveal" id="family-actions"></div>
      </section>

      <section aria-labelledby="rules-heading">
        <span class="section-label" id="rules-heading">Usage Rules</span>
        <div id="usage-rules"></div>
      </section>
    </main>

    <div class="logo-watermark" aria-hidden="true" id="logo-watermark"></div>

    <div
      class="copy-toast"
      id="copy-toast"
      role="status"
      aria-live="polite"
    ></div>

    <script type="module">
      import {
        initPage,
        categoryInfo,
        staggerReveal,
        initReveal,
      } from "../assets/js/modules/page-utils.js";
      import { UI_STRINGS } from "../assets/js/modules/site-content.js";
      import { ICONS } from "../assets/js/modules/icons.js";

      const { brand, pageData, accentHex, slug } = initPage("logo");
      const { category: cat, numLabel } = categoryInfo("logo", "01");
      const logos = pageData.logos || [];
      const logoRules = pageData.logoRules || [];

      document.querySelector("#page-header-root").setHTMLUnsafe(/* html */ `
  <div class="page-header">
    <span class="page-header__num">${numLabel}</span>
    <h1 class="page-header__title">${cat.name || "Logo"}</h1>
    <p class="page-header__tagline">${cat.tagline}</p>
  </div>
`);
      document.title = `Logo — ${brand.name || "Brand Guidelines"}`;

      // ---- Logo cards ----
      const grid = document.querySelector("#logo-grid");
      const isThree = logos.length >= 3;
      grid.className = `logo-grid reveal${isThree ? " logo-grid--three" : ""}`;

      const downloadIcon = /* html */ `
  <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
    <path d="M8 2v9M5 8l3 3 3-3M3 13h10" stroke="currentColor" stroke-width="1.6"
          stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;

      const buttonLabelFor = (label) => {
        const lower = label.toLowerCase();
        if (lower.includes("icon")) return "Download Icon";
        if (lower.includes("dark")) return "Download Dark Logo";
        return "Download Logo";
      };

      grid.setHTMLUnsafe(
        logos
          .map((logo) => {
            const lower = logo.label.toLowerCase();
            const isIcon = lower.includes("icon");
            const isDark = lower.includes("dark");
            return /* html */ `
    <div class="logo-card${isIcon ? " logo-card--icon" : ""}${isDark ? " logo-card--dark" : ""}" style="background:${logo.bg}">
      <div class="logo-card__stage">
        <img class="logo-card__image" src="${logo.src}" alt="${logo.label}" loading="lazy"/>
      </div>
      <a href="${logo.svgHref}" download target="_blank" rel="noopener"
         class="download-button logo-card__download" aria-label="${buttonLabelFor(logo.label)} — ${logo.label} (SVG)">
        ${downloadIcon}
        ${buttonLabelFor(logo.label)}
      </a>
    </div>
  `;
          })
          .join("")
      );

      // ---- Product family (sub-brands) — only brands that define them ----
      const subBrands = brand.subBrands || [];
      if (subBrands.length) {
        const familySection = document.querySelector("#family-section");
        familySection.hidden = false;
        document.querySelector("#family-note").textContent =
          UI_STRINGS.subBrandFamilyNote.replace("$BRAND", brand.name);
        document.querySelector("#subbrand-grid").setHTMLUnsafe(
          subBrands
            .map(
              (sub) => /* html */ `
    <div class="subbrand-card">
      <div class="subbrand-card__stage">
        <img class="subbrand-card__logo" src="${sub.logo}" alt="${sub.name}" loading="lazy"/>
      </div>
      <div class="subbrand-card__meta">
        <span class="subbrand-card__dot" style="background:${sub.color}"></span>
        <span class="subbrand-card__name">${sub.name}</span>
        <button type="button" class="download-button subbrand-card__download"
                data-logo-url="${sub.logo}" data-logo-name="${sub.name}">
          ${downloadIcon}
          Download SVG
        </button>
      </div>
    </div>
  `
            )
            .join("")
        );

        document
          .querySelector("#subbrand-grid")
          .addEventListener("click", async (event) => {
            const button = event.target.closest("[data-logo-url]");
            if (!button) {
              return;
            }

            const response = await fetch(button.dataset.logoUrl);
            if (!response.ok) {
              throw new Error(
                `Unable to download ${button.dataset.logoName} logo`
              );
            }

            const blobUrl = URL.createObjectURL(await response.blob());
            const download = document.createElement("a");
            download.href = blobUrl;
            download.download = `${button.dataset.logoName.replaceAll(" ", "-").toLowerCase()}.svg`;
            download.click();
            URL.revokeObjectURL(blobUrl);
          });

        if (brand.subBrandZip) {
          document.querySelector("#family-actions").setHTMLUnsafe(/* html */ `
    <a href="${brand.subBrandZip}" target="_blank" rel="noopener"
       class="download-button download-button--accent">
      ${downloadIcon}
      Download All Designer Logos (.zip)
    </a>
  `);
        }
      }

      // ---- Usage rules ----
      document.querySelector("#usage-rules").setHTMLUnsafe(/* html */ `
  <div class="usage-grid">
    ${logoRules
      .map(
        (r) => /* html */ `
      <div class="usage-card reveal">
        <span class="usage-card__label">${r.label}</span>
        <span class="usage-card__value">${r.value}</span>
        <p class="usage-card__desc">${r.desc}</p>
      </div>
    `
      )
      .join("")}
  </div>
`);

      // ---- Background mark — animates in behind the content ----
      // Academy has a hand-drawn vector mark (ICONS.academy, authored on a
      // ~0–39 grid); every other brand falls back to its raster brand icon.
      const watermark = document.querySelector("#logo-watermark");
      const brandMark = ICONS[slug];
      if (brandMark) {
        watermark.setHTMLUnsafe(
          /* html */ `<svg class="logo-watermark__svg" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">${brandMark.markup}</svg>`
        );
      } else if (brand.icon) {
        watermark.setHTMLUnsafe(
          /* html */ `<img class="logo-watermark__image" src="${brand.icon}" alt=""/>`
        );
      }

      // ---- Download zip ----
      const zipUrl = pageData.zipUrl || brand.zip || "";
      document.querySelector("#download-zip").setHTMLUnsafe(
        zipUrl
          ? /* html */ `
  <a href="${zipUrl}" target="_blank" rel="noopener" class="download-button download-button--accent">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
      <path d="M8 2v9M5 8l3 3 3-3M3 13h10" stroke="currentColor" stroke-width="1.6"
            stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Download All ${brand.name || "Brand"} Assets (.zip)
  </a>
`
          : /* html */ '<p class="download-note">Download link not configured.</p>'
      );

      staggerReveal(document.querySelectorAll(".reveal"), 0, 60);
      initReveal();
    </script>
  </body>
</html>
