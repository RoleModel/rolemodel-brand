<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="canonical" href="https://rolemodelsoftware.com/brand" />
    <title>Motion — Brand Guidelines</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,100..1000&family=Space+Grotesk:wght@300..700&family=Geist+Mono:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/index.css?v=c64c61b5" />
    <script>
      (() => {
        const de = document.documentElement;
        if (new URLSearchParams(location.search).get("embed") === "1") {
          de.classList.add("is-embedded");
        }
        // Hide the page until its module has built the injected DOM (cleared in
        // page-utils initPage). The timeout is a failsafe so the page still
        // reveals if the module loads slowly or fails to run.
        de.classList.add("is-building");
        setTimeout(() => de.classList.remove("is-building"), 2000);
      })();
    </script>
  </head>

  <body>
    <div id="nav-root"></div>

    <header class="motion-hero" aria-label="Motion">
      <span class="motion-hero__num" id="hero-num">07</span>
      <h1 class="motion-hero__headline">
        Motion with
        <span class="motion-hero__cycle" id="hero-cycle" aria-live="polite"
          >purpose</span
        >
      </h1>
      <p class="motion-hero__lede" id="hero-lede"></p>
    </header>

    <main class="page-content" aria-label="Motion guidelines">
      <section aria-labelledby="ease-heading">
        <span class="section-label" id="ease-heading">Easing Curves</span>
        <p class="section-note">
          Every curve below is plotted from its real control points — watch the
          dot trace the shape, then feel the same timing drive the marker
          underneath.
        </p>
        <div class="ease-grid" id="ease-grid"></div>
      </section>

      <section aria-labelledby="principles-heading">
        <span class="section-label" id="principles-heading"
          >Motion Principles</span
        >
        <div class="principle-list" id="principles-list"></div>
      </section>
    </main>

    <script type="module">
      import {
        EASING_TOKENS,
        DURATION_TOKENS,
      } from "../assets/js/modules/page-data.js";
      import {
        initPage,
        categoryInfo,
        staggerReveal,
        initReveal,
      } from "../assets/js/modules/page-utils.js";
      import {
        CYCLE_WORDS,
        MOTION_PRINCIPLES,
      } from "../assets/js/modules/site-content.js";

      const { brand, accentHex } = initPage("motion");
      const { category: cat, numLabel } = categoryInfo("motion", "07");
      const reduceMotion = matchMedia(
        "(prefers-reduced-motion: reduce)"
      ).matches;

      document.title = `Motion — ${brand.name || "Brand Guidelines"}`;
      document.querySelector("#hero-num").textContent = numLabel;
      document.querySelector("#hero-lede").textContent = cat.tagline;

      // ---- Kinetic hero: cycle the closing word on the motion heartbeat ----
      const cycleEl = document.querySelector("#hero-cycle");
      if (!reduceMotion) {
        let i = 0;
        setInterval(() => {
          i = (i + 1) % CYCLE_WORDS.length;
          cycleEl.style.animation = "none";
          void cycleEl.offsetWidth; // reflow to restart the swap animation
          cycleEl.textContent = CYCLE_WORDS[i];
          cycleEl.style.animation = "";
        }, 2200);
      }

      // ---- Easing cards: plotted bézier curve + a tracing dot + a timed marker ----
      const PLOT = 120; // curve is drawn in a 120×120 user-unit box

      const parseBezier = (value) => value.match(/-?\d*\.?\d+/g).map(Number); // [x1,y1,x2,y2]

      const curvePath = ([x1, y1, x2, y2]) =>
        `M0,${PLOT} C${(x1 * PLOT).toFixed(2)},${(PLOT - y1 * PLOT).toFixed(2)} ` +
        `${(x2 * PLOT).toFixed(2)},${(PLOT - y2 * PLOT).toFixed(2)} ${PLOT},0`;

      const easeCard = (e, index) => {
        const points = parseBezier(e.value);
        const d = curvePath(points);
        // A looping trace: start → end (dwell) → back (dwell), on the shared cycle.
        const motion = reduceMotion
          ? ""
          : /* html */ `
    <animateMotion dur="2.2s" repeatCount="indefinite" calcMode="linear"
      keyPoints="0;1;1;0;0" keyTimes="0;0.42;0.5;0.92;1" path="${d}"/>`;
        // With animateMotion the dot origin (0,0) follows the path; when static
        // (reduced motion) place it at the curve's start instead.
        const dotPos = reduceMotion ? `cx="0" cy="${PLOT}"` : 'cx="0" cy="0"';
        return /* html */ `
  <article class="ease-card reveal" data-delay="${index * 90}" style="--ease:${e.value}">
    <div class="ease-card__plot">
      <svg class="ease-card__svg" viewBox="-14 -78 148 216" role="img" aria-label="${e.name} easing curve">
        <line class="ease-card__guide" x1="0" y1="${PLOT}" x2="${PLOT}" y2="${PLOT}"/>
        <line class="ease-card__guide" x1="0" y1="0" x2="${PLOT}" y2="0"/>
        <line class="ease-card__axis" x1="0" y1="-70" x2="0" y2="${PLOT + 14}"/>
        <path class="ease-card__curve" d="${d}" fill="none"/>
        <circle class="ease-card__dot" r="6" ${dotPos}>${motion}</circle>
      </svg>
    </div>
    <div class="ease-card__info">
      <h3 class="ease-card__name">${e.name}</h3>
      <code class="ease-card__value">${e.value}</code>
      <p class="ease-card__desc">${e.desc}</p>
    </div>
  </article>`;
      };

      document
        .querySelector("#ease-grid")
        .setHTMLUnsafe(EASING_TOKENS.map(easeCard).join(""));

      document.querySelector("#principles-list").setHTMLUnsafe(
        MOTION_PRINCIPLES.map(
          (p, i) => /* html */ `
  <article class="principle-card reveal" data-delay="${i * 70}">
    <span class="principle-card__num">0${i + 1}</span>
    <div class="principle-card__body">
      <h3 class="principle-card__title">${p.title}</h3>
      <p class="principle-card__desc">${p.desc}</p>
    </div>
  </article>
`
        ).join("")
      );

      staggerReveal(document.querySelectorAll(".reveal"), 0, 60);
      initReveal();
    </script>
  </body>
</html>
