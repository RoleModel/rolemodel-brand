<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="canonical" href="https://rolemodelsoftware.com/brand" />
    <title>Color — Brand Guidelines</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,100..1000&family=Space+Grotesk:wght@300..700&family=Geist+Mono:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/index.css" />
    <script>
      (() => {
        const de = document.documentElement;
        if (new URLSearchParams(location.search).get("embed") === "1") {
          de.classList.add("is-embedded");
        }
        // Hide the page until its module has built the injected DOM (cleared in
        // page-utils initPage). The timeout is a failsafe so the page still
        // reveals if the module loads slowly or fails to run.
        de.classList.add("is-building");
        setTimeout(() => de.classList.remove("is-building"), 2000);
      })();
    </script>
  </head>

  <body>
    <div id="nav-root"></div>

    <header class="page-header page-header--bar" id="color-hero"></header>

    <main class="palette" id="palette" aria-label="Brand color palette"></main>

    <section
      class="subpalette"
      id="subpalette"
      aria-labelledby="subpalette-heading"
      hidden
    >
      <span class="section-label" id="subpalette-heading">Product Family</span>
      <p class="section-note" id="subpalette-note"></p>
      <div class="subpalette__grid" id="subpalette-grid"></div>
    </section>

    <div
      class="copy-toast"
      id="copy-toast"
      role="status"
      aria-live="polite"
    ></div>

    <script type="module">
      import {
        initPage,
        categoryInfo,
        copyText,
        showToast,
      } from "../assets/js/modules/page-utils.js";
      import { UI_STRINGS } from "../assets/js/modules/site-content.js";

      const { brand, pageData, accentHex } = initPage("color");
      const { category: cat, numLabel } = categoryInfo("color", "02");
      const colors = pageData.colors || [];

      document.documentElement.style.setProperty(
        "--bento-cols",
        pageData.gridCols || 6
      );
      document.title = `${cat.name || "Color"} — ${brand.name || "Brand Guidelines"}`;

      // ---- Header with .ase download ----
      document.querySelector("#color-hero").setHTMLUnsafe(/* html */ `
  <div>
    <span class="page-header__num">${numLabel}</span>
    <h1 class="page-header__title">${cat.name || "Color"}</h1>
    <p class="page-header__tagline">${cat.tagline}</p>
  </div>
  <div class="page-header__actions">
    ${
      pageData.aseUrl
        ? /* html */ `
      <a class="download-button download-button--primary" href="${pageData.aseUrl}" download
         aria-label="Download Adobe Swatch Exchange file">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M8 2v9M5 8l3 3 3-3M3 13h10" stroke="currentColor" stroke-width="1.6"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Download .ase
      </a>`
        : ""
    }
  </div>
`);

      // ---- Full-screen palette bento grid ----
      const grid = document.querySelector("#palette");

      grid.setHTMLUnsafe(
        colors
          .map((color) => {
            const span = color.span || { c: 1, r: 1 };
            return /* html */ `
    <button class="palette__tile"
            style="background:${color.hex};color:contrast-color(${color.hex});
                   grid-column:span ${span.c};grid-row:span ${span.r};"
            data-hex="${color.hex}" data-cmyk="${color.cmyk || ""}"
            aria-label="${color.name} — click to copy ${color.hex}">
      <span class="palette__group-label">${color.group}</span>
      <span class="palette__copy" aria-hidden="true">
        <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
          <rect x="4.5" y="4.5" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
          <path d="M9.5 4.5v-2A1 1 0 0 0 8.5 1.5h-6a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h2" stroke="currentColor" stroke-width="1.4"/>
        </svg>
        Copy
      </span>
      <h2 class="palette__name">${color.name}</h2>
      <span class="palette__value">${color.hex}</span>
      <span class="palette__cmyk">${color.cmyk || ""}</span>
    </button>
  `;
          })
          .join("")
      );

      // ---- Product family (sub-brand) color swatches ----
      const subBrands = brand.subBrands || [];
      if (subBrands.length) {
        const subSection = document.querySelector("#subpalette");
        subSection.hidden = false;
        document.querySelector("#subpalette-note").textContent =
          UI_STRINGS.subpaletteNote;
        const subGrid = document.querySelector("#subpalette-grid");
        subGrid.setHTMLUnsafe(
          subBrands
            .map(
              (sub) => /* html */ `
    <button class="subpalette__tile"
            style="background:${sub.color};color:contrast-color(${sub.color});"
            data-hex="${sub.color}"
            aria-label="${sub.name} — click to copy ${sub.color}">
      <span class="subpalette__chip">
        <img src="${sub.logo}" alt="" loading="lazy"/>
      </span>
      <span class="subpalette__name">${sub.name}</span>
      <span class="subpalette__value">${sub.color}</span>
    </button>
  `
            )
            .join("")
        );
      }

      // ---- Click-to-copy for both the primary and sub-brand swatches ----
      // Both tile types carry data-hex, so one delegated listener covers them.
      document.body.addEventListener("click", async (e) => {
        const tile = e.target.closest("[data-hex]");
        if (!tile) {
          return;
        }
        await copyText(tile.dataset.hex);
        showToast(`Copied ${tile.dataset.hex}`);
      });
    </script>
  </body>
</html>
