<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color — Brand Guidelines</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,100..1000&family=Space+Grotesk:wght@300..700&family=Geist+Mono:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/index.css" />
    <script>
      if (new URLSearchParams(location.search).get("embed") === "1")
        document.documentElement.classList.add("is-embedded");
    </script>
  </head>

  <body>
    <div id="nav-root"></div>

    <header class="page-header page-header--bar" id="color-hero"></header>

    <main class="palette" id="palette" aria-label="Brand color palette"></main>

    <div
      class="copy-toast"
      id="copy-toast"
      role="status"
      aria-live="polite"
    ></div>

    <script type="module">
      import {
        initPage,
        categoryInfo,
        copyText,
        showToast,
      } from "../assets/js/modules/page-utils.js";

      const { brand, pageData, accentHex } = initPage("color");
      const { category: cat, numLabel } = categoryInfo("color", "02");
      const colors = pageData.colors || [];

      document.documentElement.style.setProperty(
        "--bento-cols",
        pageData.gridCols || 6
      );
      document.title = `${cat.name || "Color"} — ${brand.name || "Brand Guidelines"}`;

      // ---- Header with .ase download ----
      document.querySelector("#color-hero").setHTMLUnsafe(/* html */ `
  <div>
    <span class="page-header__num">${numLabel}</span>
    <h1 class="page-header__title">${cat.name || "Color"}</h1>
    <p class="page-header__tagline">${cat.tagline || "Our palette carries our energy and warmth."}</p>
  </div>
  <div class="page-header__actions">
    ${
      pageData.aseUrl
        ? /* html */ `
      <a class="download-button download-button--primary" href="${pageData.aseUrl}" download
         aria-label="Download Adobe Swatch Exchange file">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M8 2v9M5 8l3 3 3-3M3 13h10" stroke="currentColor" stroke-width="1.6"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Download .ase
      </a>`
        : ""
    }
  </div>
`);

      // ---- Full-screen palette bento grid ----
      const grid = document.querySelector("#palette");

      grid.setHTMLUnsafe(
        colors
          .map((color) => {
            const span = color.span || { c: 1, r: 1 };
            return /* html */ `
    <button class="palette__tile"
            style="background:${color.hex};color:contrast-color(${color.hex});
                   grid-column:span ${span.c};grid-row:span ${span.r};"
            data-hex="${color.hex}" data-cmyk="${color.cmyk || ""}"
            aria-label="${color.name} — click to copy ${color.hex}">
      <span class="palette__group-label">${color.group}</span>
      <span class="palette__copy" aria-hidden="true">
        <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
          <rect x="4.5" y="4.5" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
          <path d="M9.5 4.5v-2A1 1 0 0 0 8.5 1.5h-6a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h2" stroke="currentColor" stroke-width="1.4"/>
        </svg>
        Copy
      </span>
      <h2 class="palette__name">${color.name}</h2>
      <span class="palette__value">${color.hex}</span>
      <span class="palette__cmyk">${color.cmyk || ""}</span>
    </button>
  `;
          })
          .join("")
      );

      grid.addEventListener("click", async (e) => {
        const tile = e.target.closest(".palette__tile");
        if (!tile) return;
        await copyText(tile.dataset.hex);
        showToast(`Copied ${tile.dataset.hex}`);
      });
    </script>
  </body>
</html>
