<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Imagery — Brand Guidelines</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://framerusercontent.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,100..1000&family=Space+Grotesk:wght@300..700&family=Geist+Mono:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/index.css" />
    <script>
      if (new URLSearchParams(location.search).get("embed") === "1")
        document.documentElement.classList.add("is-embedded");
    </script>
  </head>

  <body>
    <div id="nav-root"></div>

    <header class="imagery-hero" aria-label="Imagery">
      <div
        class="imagery-hero__mosaic"
        id="hero-mosaic"
        aria-hidden="true"
      ></div>
      <div class="imagery-hero__card">
        <h1 class="imagery-hero__title">
          <span class="imagery-hero__num" id="hero-num">05.</span>
          <span id="hero-title">Imagery</span>
        </h1>
        <p class="imagery-hero__intro" id="hero-intro"></p>
      </div>
    </header>

    <main
      class="page-content page-content--imagery"
      aria-label="Imagery guidelines"
    >
      <section aria-labelledby="library-heading">
        <span class="section-label" id="library-heading">Image Library</span>
        <p class="image-viewer__hint">
          Click any image to view it full screen.
        </p>
        <div class="image-viewer" id="image-viewer" role="list"></div>
      </section>

      <section aria-labelledby="treatment-heading">
        <span class="section-label" id="treatment-heading">Treatment</span>
        <div id="treatment-content"></div>
      </section>
    </main>

    <div
      class="lightbox"
      id="lightbox"
      role="dialog"
      aria-modal="true"
      aria-label="Image viewer"
      hidden
    >
      <button
        class="lightbox__close"
        id="lightbox-close"
        aria-label="Close viewer"
      >
        <svg
          width="16"
          height="16"
          viewBox="0 0 16 16"
          fill="none"
          aria-hidden="true"
        >
          <path
            d="M2 2L14 14M14 2L2 14"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          />
        </svg>
      </button>
      <button
        class="lightbox__arrow lightbox__arrow--prev"
        id="lightbox-prev"
        aria-label="Previous image"
      >
        <svg
          width="18"
          height="18"
          viewBox="0 0 18 18"
          fill="none"
          aria-hidden="true"
        >
          <path
            d="M11.5 3L6 9L11.5 15"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>
      <figure class="lightbox__stage">
        <img
          class="lightbox__image"
          id="lightbox-image"
          src=""
          alt="Brand imagery"
        />
      </figure>
      <button
        class="lightbox__arrow lightbox__arrow--next"
        id="lightbox-next"
        aria-label="Next image"
      >
        <svg
          width="18"
          height="18"
          viewBox="0 0 18 18"
          fill="none"
          aria-hidden="true"
        >
          <path
            d="M6.5 3L12 9L6.5 15"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>
      <span class="lightbox__counter" id="lightbox-counter">1 / 1</span>
    </div>

    <script type="module">
      import {
        initPage,
        categoryInfo,
        initReveal,
      } from "../assets/js/modules/page-utils.js";

      const { brand, pageData } = initPage("imagery");
      const { category: cat, numLabel } = categoryInfo("imagery", "05");

      document.title = `Imagery — ${brand.name || "Brand Guidelines"}`;
      document.querySelector("#hero-num").textContent = `${numLabel}.`;
      document.querySelector("#hero-title").textContent = cat.name || "Imagery";
      document.querySelector("#hero-intro").textContent =
        pageData.imageryIntro ||
        cat.tagline ||
        "Photography should feel human and unscripted.";

      const images = pageData.imagery || [];

      // ---- Hero mosaic — irregular full-bleed grid behind the title card ----
      // Span pattern fills the 6×2 desktop grid exactly (2+2+2+1+2+1+2 = 12 cells).
      const MOSAIC_SPANS = ["a", "b", "c", "d", "e", "f", "g"];
      document.querySelector("#hero-mosaic").setHTMLUnsafe(
        MOSAIC_SPANS.map((k, i) => {
          const img = images[i % images.length];
          return img
            ? /* html */ `
    <div class="imagery-hero__tile imagery-hero__tile--${k}">
      <img class="imagery-hero__img" src="${img.src}" alt="" loading="eager" decoding="async"/>
    </div>
  `
            : "";
        }).join("")
      );

      // ---- Library viewer grid ----
      const viewer = document.querySelector("#image-viewer");
      viewer.setHTMLUnsafe(
        images
          .map(
            (img, i) => /* html */ `
  <button class="image-viewer__tile reveal" role="listitem" data-index="${i}"
          data-delay="${(i % 8) * 40}" aria-label="View image ${i + 1} full screen">
    <img class="image-viewer__img" src="${img.src}" alt="Brand imagery ${i + 1}" loading="lazy" decoding="async"/>
  </button>
`
          )
          .join("")
      );

      // ---- Lightbox ----
      const lightbox = document.querySelector("#lightbox");
      const lightboxImage = document.querySelector("#lightbox-image");
      const lightboxCounter = document.querySelector("#lightbox-counter");
      let current = 0;
      let lastFocus = null;

      const show = (index) => {
        current = (index + images.length) % images.length;
        lightboxImage.src = images[current].full || images[current].src;
        lightboxCounter.textContent = `${current + 1} / ${images.length}`;
      };

      const openLightbox = (index) => {
        lastFocus = document.activeElement;
        show(index);
        lightbox.hidden = false;
        document.body.classList.add("lightbox-open");
        requestAnimationFrame(() =>
          lightbox.classList.add("lightbox--visible")
        );
        document.querySelector("#lightbox-close").focus();
      };

      const closeLightbox = () => {
        lightbox.classList.remove("lightbox--visible");
        document.body.classList.remove("lightbox-open");
        setTimeout(() => {
          lightbox.hidden = true;
        }, 250);
        if (lastFocus) lastFocus.focus();
      };

      viewer.addEventListener("click", (e) => {
        const tile = e.target.closest(".image-viewer__tile");
        if (tile) openLightbox(Number(tile.dataset.index));
      });
      document
        .querySelector("#lightbox-close")
        .addEventListener("click", closeLightbox);
      document
        .querySelector("#lightbox-prev")
        .addEventListener("click", () => show(current - 1));
      document
        .querySelector("#lightbox-next")
        .addEventListener("click", () => show(current + 1));
      lightbox.addEventListener("click", (e) => {
        if (e.target === lightbox) closeLightbox();
      });
      document.addEventListener("keydown", (e) => {
        if (lightbox.hidden) return;
        if (e.key === "Escape") closeLightbox();
        if (e.key === "ArrowLeft") show(current - 1);
        if (e.key === "ArrowRight") show(current + 1);
      });

      // ---- Treatment ----
      const treatments = [
        {
          label: "Crop",
          text: "Tight crops on faces or hands convey craft. Wide establishing shots need a clear subject in the foreground.",
        },
        {
          label: "Color",
          text: "Slight warmth bias. Avoid cold, desaturated tones. The image doesn't have to match the brand palette exactly.",
        },
        {
          label: "Overlay",
          text: "When placing text over images, use a single-color tint overlay at 50–70% opacity, or position text in a clear area.",
        },
      ];
      document.querySelector("#treatment-content").setHTMLUnsafe(/* html */ `
  <div class="spec-card reveal">
    <div class="spec-card__grid">
      ${treatments
        .map(
          (t) => /* html */ `
        <div>
          <span class="spec-card__label">${t.label}</span>
          <p class="spec-card__text">${t.text}</p>
        </div>
      `
        )
        .join("")}
    </div>
  </div>
`);

      initReveal();
    </script>
  </body>
</html>
